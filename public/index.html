 <!-- index.html -->

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>불의검</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="title">불의검</div>

      <div class="panel joinRow">
        <input id="roomId" placeholder="" />
        <button id="joinBtn">방 입장</button>
      </div>
    </div>

    <!-- HUD -->
    <div class="row hudWrap">
      <div class="panel hud you col" id="hudLeft">
        <div class="hudHeader">
          <div class="hudLeft">
            <div class="badge" id="leftBadge">-</div>
            <div>
              <div class="hudMeta">HP <b id="leftHp">-</b> / 20</div>
            </div>
          </div>
        </div>

        <div class="hpbar"><div class="hpfill" id="leftHpFill"></div></div>

        <!-- (왼)방어 / (오)무기 -->
        <div class="hudGrid">
          <div class="panel2">
            <div class="label">방어</div>
            <div class="value" id="leftArmor">-</div>
          </div>
          <div class="panel2">
            <div class="label">무기</div>
            <div class="value" id="leftWeapon">-</div>
          </div>
        </div>

        <div class="chips">
          <span class="chip"><span id="leftTokens" class="tokline"></span></span>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">손패(공개)</div>
        <div class="handRow" id="leftHand"></div>
      </div>

      <div class="panel hud col" id="hudRight">
        <div class="hudHeader">
          <div class="hudLeft">
            <div class="badge" id="rightBadge">-</div>
            <div>
              <div class="hudMeta">HP <b id="rightHp">-</b> / 20</div>
            </div>
          </div>
        </div>

        <div class="hpbar"><div class="hpfill" id="rightHpFill"></div></div>

        <!-- (왼)방어 / (오)무기 -->
        <div class="hudGrid">
          <div class="panel2">
            <div class="label">방어</div>
            <div class="value" id="rightArmor">-</div>
          </div>
          <div class="panel2">
            <div class="label">무기</div>
            <div class="value" id="rightWeapon">-</div>
          </div>
        </div>

        <div class="chips">
          <span class="chip"><span id="rightTokens" class="tokline"></span></span>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">손패(공개)</div>
        <div class="handRow" id="rightHand"></div>
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <!-- 조작 -->
      <div class="panel col">
        <div class="sectionTitle">조작</div>

        <div class="actionRow">
          <button id="rollBtn" class="actionBtn" disabled title="주사위">🎲</button>
          <button id="takeDeckBtn" class="actionBtn" disabled title="덱">📦</button>
          <div id="openButtons" class="actionRowInner"></div>
        </div>

        <div class="divider"></div>

        <!-- ✅ 업그레이드: 10장 아이콘 버튼만 -->
        <div class="sectionTitle">업그레이드</div>
        <div id="upgradeButtons" class="upgradeRow"></div>

        <div class="divider"></div>

        <div class="sectionTitle">전투</div>
        <div class="btnGrid">
          <button id="endTurnBtn" disabled>✅ 턴 종료</button>
          <span class="pill">양쪽모두 토큰을 3개 모으면 전투합니다.</span>
        </div>

        <div id="combatPanel" class="panel2" style="margin-top:10px; display:none;">
          <div class="hudMeta" style="margin-bottom:8px;">내 토큰 선택 (무기 1 + 방어 1)</div>
          <div class="btnGrid">
            <select id="combatW">
              <option value="R">무기: R</option>
              <option value="B">무기: B</option>
              <option value="Y">무기: Y</option>
            </select>
            <select id="combatA">
              <option value="R">방어: R</option>
              <option value="B">방어: B</option>
              <option value="Y">방어: Y</option>
            </select>
            <button id="submitCombatBtn">선택 제출</button>
            <span class="pill">상태 <b id="combatStatus">-</b></span>
          </div>
        </div>

        <span id="openText" style="display:none;"></span>
      </div>

      <!-- 로그 -->
      <div class="panel col">
        <div class="sectionTitle">로그</div>
        <pre id="log"></pre>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
