<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>불의검</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="title">불의검 <span class="subtitle">Prototype</span></div>

      <div class="panel joinRow">
        <input id="roomId" placeholder="room id (예: abc123)" />
        <button id="joinBtn">방 입장</button>

        <span class="pill">내 좌석 <b id="seat">-</b></span>
        <span class="pill">현재 턴 <b id="turn">-</b></span>
        <span class="pill">진행 <b id="phase">-</b></span>
        <span class="pill">덱 <b id="deckCount">-</b></span>
      </div>
    </div>

    <!-- HUD -->
    <div class="row hudWrap">
      <div class="panel hud you col" id="hudLeft">
        <div class="hudHeader">
          <div class="hudLeft">
            <div class="badge" id="leftBadge">-</div>
            <div>
              <div class="hudName" id="leftName">YOU</div>
              <div class="hudMeta">HP <b id="leftHp">-</b> / 20</div>
            </div>
          </div>
          <div class="hudMeta">손패 <b id="leftHandCount">0</b></div>
        </div>

        <div class="hpbar"><div class="hpfill" id="leftHpFill"></div></div>

        <div class="hudGrid">
          <div class="panel2">
            <div class="label">무기</div>
            <div class="value" id="leftWeapon">-</div>
          </div>
          <div class="panel2">
            <div class="label">방어</div>
            <div class="value" id="leftArmor">-</div>
          </div>
        </div>

        <div class="chips">
          <span class="chip"><small>토큰</small> <span id="leftTokens" class="tokline"></span></span>
          <span class="chip"><small>총합</small> <span id="leftTokTotal">-</span></span>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">손패(공개)</div>
        <div class="handRow" id="leftHand"></div>
      </div>

      <div class="panel hud col" id="hudRight">
        <div class="hudHeader">
          <div class="hudLeft">
            <div class="badge" id="rightBadge">-</div>
            <div>
              <div class="hudName" id="rightName">OPPONENT</div>
              <div class="hudMeta">HP <b id="rightHp">-</b> / 20</div>
            </div>
          </div>
          <div class="hudMeta">손패 <b id="rightHandCount">0</b></div>
        </div>

        <div class="hpbar"><div class="hpfill" id="rightHpFill"></div></div>

        <div class="hudGrid">
          <div class="panel2">
            <div class="label">무기</div>
            <div class="value" id="rightWeapon">-</div>
          </div>
          <div class="panel2">
            <div class="label">방어</div>
            <div class="value" id="rightArmor">-</div>
          </div>
        </div>

        <div class="chips">
          <span class="chip"><small>토큰</small> <span id="rightTokens" class="tokline"></span></span>
          <span class="chip"><small>총합</small> <span id="rightTokTotal">-</span></span>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">손패(공개)</div>
        <div class="handRow" id="rightHand"></div>
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <!-- 조작 -->
      <div class="panel col">
        <div class="sectionTitle">조작</div>

        <!-- ✅ 여기만 3:7 -->
        <div class="actionSplit">
          <div class="actionLeft">
            <div class="btnGrid" style="flex-wrap:nowrap;">
              <button id="rollBtn" disabled>🎲 주사위</button>
            </div>
          </div>

          <div class="vDivider"></div>

          <div class="actionRight">
            <div class="openRow">
              <button id="takeDeckBtn" disabled>📦 덱에서 1장</button>
              <div id="openButtons" class="openRow"></div>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">장착</div>
        <div class="btnGrid">
          <select id="equipSlot">
            <option value="weapon">무기</option>
            <option value="armor">방어</option>
          </select>
          <select id="equipCard"></select>
          <button id="equipBtn" disabled>장착</button>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">업그레이드</div>
        <div class="btnGrid">
          <select id="upType">
            <option value="weapon">무기</option>
            <option value="armor">방어</option>
          </select>
          <select id="upBase"></select>
          <button id="upCBtn" disabled>c 업글</button>
          <button id="upBBtn" disabled>b 업글</button>
          <button id="upABtn" disabled>a 업글</button>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">전투</div>
        <div class="btnGrid">
          <button id="endTurnBtn" disabled>✅ 턴 종료</button>
          <span class="pill">양쪽모두 토큰을 3개 모으면 전투합니다.</span>
        </div>

        <div id="combatPanel" class="panel2" style="margin-top:10px; display:none;">
          <div class="hudMeta" style="margin-bottom:8px;">내 토큰 선택 (무기 1 + 방어 1)</div>
          <div class="btnGrid">
            <select id="combatW">
              <option value="R">무기: R</option>
              <option value="B">무기: B</option>
              <option value="Y">무기: Y</option>
            </select>
            <select id="combatA">
              <option value="R">방어: R</option>
              <option value="B">방어: B</option>
              <option value="Y">방어: Y</option>
            </select>
            <button id="submitCombatBtn">선택 제출</button>
            <span class="pill">상태 <b id="combatStatus">-</b></span>
          </div>
        </div>

        <span id="openText" style="display:none;"></span>
      </div>

      <!-- 로그 -->
      <div class="panel col">
        <div class="sectionTitle">로그</div>
        <pre id="log"></pre>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
